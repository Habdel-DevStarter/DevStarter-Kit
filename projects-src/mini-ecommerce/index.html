<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini E-commerce</title>
    <style>
      body{font-family:Segoe UI,sans-serif;margin:0;background:#f8fafc;color:#0f172a}
      .wrap{max-width:1000px;margin:auto;padding:1rem}
      .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem}
      .card{background:#fff;border:1px solid #dbe2f1;border-radius:12px;padding:1rem}
      button{border:0;background:#0e8cff;color:#fff;padding:.55rem .8rem;border-radius:999px;cursor:pointer}
      .cart{margin-top:1rem;background:#fff;padding:1rem;border-radius:12px}
      @media(max-width:850px){.grid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Mini E-commerce</h1>
      <section class="grid" id="products"></section>
      <section class="cart">
        <h2>Panier</h2>
        <p id="cartCount">0 article</p>
      </section>
    </main>
    <script>
      const products=[{name:"Casque",price:59},{name:"Clavier",price:89},{name:"Souris",price:39}];
      const productsEl=document.getElementById("products");
      const cartCount=document.getElementById("cartCount");
      let cart=JSON.parse(localStorage.getItem("mini-cart")||"[]");
      function renderCount(){cartCount.textContent=cart.length+" article(s)";}
      productsEl.innerHTML=products.map((p,i)=>`<article class="card"><h3>${p.name}</h3><p>${p.price}€</p><button data-i="${i}">Ajouter</button></article>`).join("");
      productsEl.addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;cart.push(products[Number(b.dataset.i)]);localStorage.setItem("mini-cart",JSON.stringify(cart));renderCount();});
      renderCount();
    </script>
  </body>
</html>
