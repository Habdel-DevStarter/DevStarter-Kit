<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin</title>
    <style>
      body{margin:0;font-family:Segoe UI,sans-serif;background:#f1f5f9;color:#0f172a}
      .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
      aside{background:#0f172a;color:#fff;padding:1rem}
      main{padding:1rem}
      .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem}
      .card{background:#fff;border-radius:12px;padding:1rem;box-shadow:0 8px 20px rgba(2,6,23,.06)}
      table{width:100%;border-collapse:collapse}
      th,td{padding:.55rem;border-bottom:1px solid #e2e8f0;text-align:left}
      @media(max-width:900px){.layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <h2>Admin</h2>
        <p>Dashboard</p><p>Users</p><p>Settings</p>
      </aside>
      <main>
        <div class="grid">
          <article class="card"><h3>Revenus</h3><p>18 420€</p></article>
          <article class="card"><h3>Nouveaux users</h3><p>124</p></article>
          <article class="card"><h3>Tickets</h3><p>12 ouverts</p></article>
        </div>
        <article class="card" style="margin-top:.8rem">
          <h3>Dernières commandes</h3>
          <table>
            <tr><th>ID</th><th>Client</th><th>Montant</th></tr>
            <tr><td>#1042</td><td>Alex</td><td>89€</td></tr>
            <tr><td>#1043</td><td>Nora</td><td>129€</td></tr>
          </table>
        </article>
      </main>
    </div>
  </body>
</html>
